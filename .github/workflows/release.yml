name: release

on:
  push:
    tags:
      - "v*"

defaults:
  run:
    shell: bash

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          path: lapp-js
      - uses: actions/checkout@v4
        with:
          repository: openlapp/lapp
          ref: 44619f9d86ab4beef4aef5ba2d74433cab595607
          path: lapp
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: lapp-js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: lapp-js
      - run: pnpm build
        working-directory: lapp-js
      - run: pnpm lint
        working-directory: lapp-js
      - run: pnpm test
        working-directory: lapp-js
      - if: matrix.node-version == 22
        run: pnpm coverage
        working-directory: lapp-js
      - if: matrix.node-version == 22
        run: npm ci
        working-directory: lapp
      - if: matrix.node-version == 22
        run: npm test
        working-directory: lapp
      - run: pnpm verify:docs
        working-directory: lapp-js
      - run: pnpm verify:spec
        working-directory: lapp-js
      - run: git diff --check
        working-directory: lapp-js

  pack-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: lapp-js
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lapp-js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: lapp-js
      - run: pnpm build
        working-directory: lapp-js
      - run: pnpm smoke:pack
        working-directory: lapp-js
      - run: git diff --check
        working-directory: lapp-js

  windows-vault:
    runs-on: windows-latest
    defaults:
      run:
        shell: pwsh
    strategy:
      matrix:
        node-version: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
        with:
          path: lapp-js
      - uses: actions/checkout@v4
        with:
          repository: openlapp/lapp
          ref: 44619f9d86ab4beef4aef5ba2d74433cab595607
          path: lapp
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm
          cache-dependency-path: lapp-js/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
        working-directory: lapp-js
      - run: pnpm build
        working-directory: lapp-js
      - run: pnpm lint
        working-directory: lapp-js
      - run: pnpm test
        working-directory: lapp-js
      - run: pnpm verify:docs
        working-directory: lapp-js
      - run: pnpm verify:spec
        working-directory: lapp-js
      - run: pnpm test:vault:system
        working-directory: lapp-js
      - if: matrix.node-version == 22
        run: pnpm smoke:pack
        working-directory: lapp-js
      - run: git diff --check
        working-directory: lapp-js

  release:
    needs: [quality, pack-smoke, windows-vault]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          path: lapp-js
      - uses: pnpm/action-setup@v4
        with:
          version: 10.29.2
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: lapp-js/pnpm-lock.yaml
          registry-url: https://registry.npmjs.org
      - run: pnpm install --frozen-lockfile
        working-directory: lapp-js

      - name: Verify committed version matches tag
        id: version
        working-directory: lapp-js
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          SDK_VERSION="$(node -p "require('./packages/lapp/package.json').version")"
          CLI_VERSION="$(node -p "require('./packages/cli/package.json').version")"
          if [[ "$SDK_VERSION" != "$CLI_VERSION" || "$SDK_VERSION" != "$TAG_VERSION" ]]; then
            echo "version mismatch: tag=$TAG_VERSION sdk=$SDK_VERSION cli=$CLI_VERSION"
            exit 1
          fi
          if [[ "$SDK_VERSION" == *-* ]]; then
            echo "dist_tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "dist_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - run: pnpm build
        working-directory: lapp-js

      - name: Publish @openlapp/lapp
        working-directory: lapp-js
        run: pnpm --filter @openlapp/lapp publish --access public --no-git-checks --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @openlapp/cli
        working-directory: lapp-js
        run: pnpm --filter @openlapp/cli publish --access public --no-git-checks --tag "${{ steps.version.outputs.dist_tag }}"
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
